name: Publish tybird API spec

# Renders API.md and publishes it to GitHub Pages on every merge to main.

on:
  push:
    branches: [main]
    paths:
      - "API.md"
      - ".github/workflows/publish.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Enable GitHub Pages on first run (build type = GitHub Actions), no manual setup needed.
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Render API.md to HTML
        run: |
          mkdir -p dist
          npx --yes marked@12 < API.md > dist/_body.html
          {
            echo '<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">'
            echo '<meta name="viewport" content="width=device-width, initial-scale=1">'
            echo '<title>tybird API - Specification</title>'
            echo '<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.1/github-markdown.min.css">'
            echo '<style>body{margin:0;background:#fff}.markdown-body{box-sizing:border-box;min-width:200px;max-width:920px;margin:0 auto;padding:40px 24px}</style>'
            echo '</head><body><article class="markdown-body">'
            cat dist/_body.html
            echo '</article></body></html>'
          } > dist/index.html
          rm dist/_body.html
          cp API.md dist/API.md

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
